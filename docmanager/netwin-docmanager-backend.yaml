apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/app: netwin-docmanager-backend
    app.kubernetes.io/component: docmanager-backend
    app.kubernetes.io/instance: netwin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: netwin-docmanager-backend
    app.kubernetes.io/version: 1.0.6-r2
    helm.sh/chart: netwin-0.1.0
  name: netwin-docmanager-backend
  namespace: netwin
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/app: netwin-docmanager-backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/app: netwin-docmanager-backend
        app.kubernetes.io/component: docmanager-backend
        app.kubernetes.io/instance: netwin
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: netwin-docmanager-backend
        app.kubernetes.io/version: 1.0.6-r2
        helm.sh/chart: netwin-0.1.0
    spec:
      securityContext:
        runAsUser: 1982
      serviceAccountName: sa-nossis
      initContainers:
      - name: migrate
        image: acrdevopsfbdev2demo.azurecr.io/netwin/nossis-docmanager-backend:2.1.0-r202510211325
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        - /opt/alticelabs/docmanager/bin/run-migration.sh repair
        envFrom:
        - secretRef:
            name: netwin-credentials
        resources:
          limits:
            cpu: 100m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 256Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1982
        volumeMounts:
        - mountPath: /opt/alticelabs/docmanager/bin/configurator.properties
          name: netwin-docmanager-configuration
          subPath: configurator.properties
      containers:
      - name: java-service
        image: acrdevopsfbdev2demo.azurecr.io/netwin/nossis-docmanager-backend:2.1.0-r202510211325
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: netwin-credentials
        ports:
        - containerPort: 9005
          name: public
          protocol: TCP
        livenessProbe:
          failureThreshold: 10
          initialDelaySeconds: 45
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 9005
          timeoutSeconds: 10
        readinessProbe:
          failureThreshold: 10
          initialDelaySeconds: 45
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 9005
          timeoutSeconds: 10
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 2Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1982
        volumeMounts:
        - mountPath: /opt/alticelabs/docmanager/bin/configurator.properties
          name: netwin-docmanager-configuration
          subPath: configurator.properties
      volumes:
      - name: netwin-docmanager-configuration
        configMap:
          defaultMode: 420
          name: netwin-docmanager-configuration
          items:
          - key: configurator.properties
            path: configurator.properties
