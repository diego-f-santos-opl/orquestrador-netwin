apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/app: netwin-tomcat-prov
    app.kubernetes.io/component: tomcat-prov
    app.kubernetes.io/instance: netwin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tomcat-prov
    app.kubernetes.io/version: 1.0.7-r1
    helm.sh/chart: netwin-0.1.0
  name: netwin-tomcat-prov
  namespace: netwin
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/app: netwin-tomcat-prov
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/app: netwin-tomcat-prov
        app.kubernetes.io/component: tomcat-prov
        app.kubernetes.io/instance: netwin
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: tomcat-prov
        app.kubernetes.io/version: 1.0.7-r1
        helm.sh/chart: netwin-0.1.0
    spec:
      containers:
      - args:
        - tomcat
        env:
        - name: DB_HOST
          value: 10.51.201.2
        - name: NETWIN_BD_SERVICE_NAME
          value: netwdev
        - name: NETWIN_SOL_BD_USER
          valueFrom:
            secretKeyRef:
              key: DB_USER
              name: netwin-credentials
        - name: NETWIN_SOL_BD_PASS
          valueFrom:
            secretKeyRef:
              key: DB_PASS
              name: netwin-credentials
        envFrom:
        - secretRef:
            name: netwin-credentials
        image: ghcr.io/alticelabsprojects/inventory-vtal:1.0.7-r1
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 150
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 1
        name: netwin-tomcat-prov
        ports:
        - containerPort: 8000
          name: http1
          protocol: TCP
        - containerPort: 8080
          name: http2
          protocol: TCP
        - containerPort: 8998
          name: http3
          protocol: TCP
        - containerPort: 40001
          name: http4
          protocol: TCP
        - containerPort: 8885
          name: prom-metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 150
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
          requests:
            cpu: 200m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /opt/alticelabs/automation/netwin/inventory/hosts
          name: deploy-conf
          subPath: hosts
        - mountPath: /opt/alticelabs/automation/netwin/certs/tls.crt
          name: vtal-cert
          subPath: tls.crt
        - mountPath: /opt/alticelabs/automation/netwin/certs/tls.key
          name: vtal-cert
          subPath: tls.key
        - mountPath: /opt/alticelabs/automation/netwin/certs/vtal-ca.crt
          name: vtal-ca
          subPath: vtal-ca.crt
        - mountPath: /opt/alticelabs/automation/netwin/certs/ca.crt
          name: altice-ca
          subPath: ca.crt
      imagePullSecrets:
      - name: acr-secret
      - name: ghcr-secret
      initContainers:
      - command:
        - /bin/sh
        - -c
        - "for i in {1..30}; do\n  sleep 10;\n  if timeout 5 curl -v telnet://netwin-wildfly-prov:10190\
          \ 2>&1 | grep -q 'Connected'; then\n    exit 0;\n  fi;\ndone; exit 1\n"
        image: ghcr.io/alticelabsprojects/inventory-vtal:1.0.7-r1
        imagePullPolicy: Always
        name: tomcat-prov-wait-for-netwin-wildfly-prov
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 50m
            memory: 100Mi
        securityContext:
          runAsNonRoot: true
      securityContext:
        runAsGroup: 1009
        runAsUser: 992
      serviceAccountName: sa-nossis
      volumes:
      - configMap:
          defaultMode: 420
          name: netwin-deploy-conf
        name: deploy-conf
      - name: vtal-cert
        secret:
          defaultMode: 420
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
          secretName: netwin-web-certificate
      - name: vtal-ca
        secret:
          defaultMode: 420
          items:
          - key: ca.crt
            path: vtal-ca.crt
          secretName: vtal-ca
      - name: altice-ca
        secret:
          defaultMode: 420
          items:
          - key: ca.crt
            path: ca.crt
          secretName: netwin-web-certificate
