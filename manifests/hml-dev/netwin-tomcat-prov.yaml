apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/app: netwin-tomcat-prov
    app.kubernetes.io/component: tomcat-prov
    app.kubernetes.io/instance: netwin
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tomcat-prov
    app.kubernetes.io/version: 1.0.7-r1
    helm.sh/chart: netwin-0.1.0
  name: netwin-tomcat-prov
  namespace: nossis-netwin-dev-hml
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/app: netwin-tomcat-prov
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/app: netwin-tomcat-prov
        app.kubernetes.io/component: tomcat-prov
        app.kubernetes.io/instance: netwin
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: tomcat-prov
        app.kubernetes.io/version: 1.0.7-r1
        helm.sh/chart: netwin-0.1.0
    spec:
      containers:
      - args:
        - tomcat
        env:
        - name: DB_HOST
          value: nossdev1-h1
        - name: NETWIN_BD_SERVICE_NAME
          value: nossdev1
        - name: NETWIN_SOL_BD_USER
          valueFrom:
            secretKeyRef:
              key: db_user
              name: netwin-credentials
              optional: false
        - name: NETWIN_SOL_BD_PASS
          valueFrom:
            secretKeyRef:
              key: db_pass
              name: netwin-credentials
              optional: false
        envFrom:
        - secretRef:
            name: netwin-credentials
        image: ghcr.io/alticelabsprojects/inventory-vtal:1.0.7-r1
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 150
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 1
        name: netwin-tomcat-prov
        ports:
        - containerPort: 8000
          name: http1
          protocol: TCP
        - containerPort: 8080
          name: http2
          protocol: TCP
        - containerPort: 8998
          name: http3
          protocol: TCP
        - containerPort: 40001
          name: http4
          protocol: TCP
        - containerPort: 8885
          name: prom-metrics
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 150
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: 200m
            memory: 2Gi
        securityContext:
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /opt/alticelabs/automation/netwin/inventory/hosts
          name: deploy-conf
          subPath: hosts
        - mountPath: /opt/alticelabs/automation/netwin/certs/tls.crt
          name: vtal-cert
          subPath: tls.crt
        - mountPath: /opt/alticelabs/automation/netwin/certs/tls.key
          name: vtal-cert
          subPath: tls.key
        - mountPath: /opt/alticelabs/automation/netwin/certs/vtal-ca.crt
          name: vtal-ca
          subPath: vtal-ca.crt
      initContainers:
      - command:
        - /bin/sh
        - -c
        - for i in {1..30}; do sleep 10; if timeout 5 curl -v telnet://netwin-wildfly-prov:10190
          2>&1 | grep -q 'Connected'; then exit 0; fi; done; exit 1
        image: ghcr.io/alticelabsprojects/inventory-vtal:1.0.7-r1
        imagePullPolicy: Always
        name: tomcat-prov-wait-for-netwin-wildfly-prov
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 50m
            memory: 100Mi
        securityContext:
          runAsNonRoot: true
      securityContext:
        runAsGroup: 1009
        runAsUser: 992
      serviceAccountName: sa-nossis
      volumes:
      - configMap:
          name: netwin-deploy-conf
        name: deploy-conf
      - name: vtal-cert
        secret:
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
          secretName: netwin-nprd-tls
      - name: vtal-ca
        secret:
          items:
          - key: vtal-ca.crt
            path: vtal-ca.crt
          secretName: vtal-ca-tls
